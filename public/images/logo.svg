<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="100%" height="100%">
  <!-- Icon: A rounded square with energetic teal background and bold white check/snap gesture icon -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="30" height="30" rx="8" fill="#0d9488"/>
    <!-- Bold white snap gesture checkmark -->
    <path d="M8 15L13 20L22 10" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text: "Snap" -->
  <text x="52" y="31" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="900" fill="#0f172a" letter-spacing="-0.5">Snap</text>
  <!-- Accent Dot -->
  <circle cx="110" cy="27" r="3.5" fill="#0d9488"/>
  <!-- Tagline: "Solved." -->
  <text x="52" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="1.5">SOLVED.</text>
</svg>